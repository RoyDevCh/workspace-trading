meta:
  timezone: "Asia/Shanghai"

agent:
  interval_minutes: 5
  symbols:
    - "BTC/USDT"
    - "ETH/USDT"
  review_markets:
    - "crypto"
    - "cn_equity"
  auto_execution_markets:
    - "crypto"
    - "cn_equity"
  symbol_groups:
    crypto:
      - "BTC/USDT"
      - "ETH/USDT"
    cn_equity:
      - "510300"
      - "159915"
    futures:
      - "BTC/USDT"
      - "ETH/USDT"
  market_settings:
    crypto:
      timeframe: "1h"
      lookback: 100
      source: "ccxt"
    cn_equity:
      timeframe: "1d"
      lookback: 120
      source: "auto"
    futures:
      timeframe: "1h"
      lookback: 120
      source: "ccxt"

strategy:
  default_strategy: "combined"
  definitions:
    trend_following:
      name: "trend_following"
      kind: "trend_following"
      ema_fast_period: 5
      ema_slow_period: 20
      rsi_period: 14
      buy_rsi_below: 70
      sell_rsi_above: 85
      sell_all_on_exit: true
      order_size:
        default: 0.001
    combined:
      name: "combined"
      kind: "combined"
      fast: 5
      slow: 20
      rsi_period: 14
      rsi_upper: 70
      rsi_lower: 30
      sell_all_on_exit: true
      order_size:
        default: 0.001
    mean_reversion:
      name: "mean_reversion"
      kind: "mean_reversion"
      bb_period: 20
      bb_stddev: 2.0
      rsi_period: 14
      buy_rsi_below: 38
      sell_rsi_above: 68
      exit_on_midline: true
      midline_exit_rsi_above: 52
      sell_all_on_exit: true
      order_size:
        default: 0.05
  market_overrides:
    cn_equity:
      strategy: "trend_following"
      ema_fast_period: 8
      ema_slow_period: 21
      rsi_period: 14
      buy_rsi_below: 68
      sell_rsi_above: 82
      order_size:
        default: 100
  symbol_overrides:
    BTC/USDT:
      strategy: "combined"
      fast: 5
      slow: 20
      rsi_period: 14
      rsi_upper: 70
      rsi_lower: 30
      position_scale: 1.0
      order_size:
        default: 0.01
        per_symbol:
          BTC/USDT: 0.01
    ETH/USDT:
      strategy: "combined"
      fast: 5
      slow: 20
      rsi_period: 14
      rsi_upper: 70
      rsi_lower: 30
      position_scale: 0.8
      order_size:
        default: 0.1
        per_symbol:
          ETH/USDT: 0.1
    "510300":
      strategy: "trend_following"
      ema_fast_period: 8
      ema_slow_period: 21
      order_size:
        default: 200
        per_symbol:
          "510300": 200
    "159915":
      strategy: "trend_following"
      ema_fast_period: 8
      ema_slow_period: 21
      order_size:
        default: 200
        per_symbol:
          "159915": 200

risk:
  max_single_loss_pct: 0.02
  max_daily_loss_pct: 0.05
  default_stop_loss_pct: 0.02
  max_order_value_usdt: 50000
  max_position_value_usdt: 100000
  max_daily_notional_usdt: 200000
  min_cash_ratio: 0.10
  consecutive_failures_to_pause: 3
  pause_minutes_after_failures: 30

account:
  execution_mode: "ccxt"
  exchange: "binance"
  testnet: true
  assumed_equity_usdt: 10000
  assumed_equity_by_market:
    crypto: 10000
    cn_equity: 100000
    futures: 10000
  market_modes:
    crypto: "ccxt"
    cn_equity: "ths_bridge"
    futures: "ccxt_futures"

macro:
  state_file: "C:/Users/Roy/.openclaw/workspace-trading/runtime/macro_state.json"
  refresh_interval_minutes: 15
  lookback: 120
  volatility_window: 20
  high_vol_percentile: 0.8
  position_scale_reduction_on_high_vol: 0.5
  crypto_symbol: "BTC/USDT"
  crypto_source: "ccxt"
  crypto_interval: "1d"
  cn_equity_symbol: "510300"
  cn_equity_source: "auto"
  cn_equity_interval: "1d"

market_sessions:
  cn_equity:
    enabled: true
    timezone: "Asia/Shanghai"
    trading_days: ["mon", "tue", "wed", "thu", "fri"]
    holidays: []
    extra_trading_days: []
    sessions:
      - name: "morning"
        start: "09:30"
        end: "11:30"
      - name: "afternoon"
        start: "13:00"
        end: "15:00"

optimization:
  enabled: true
  report_file: "C:/Users/Roy/.openclaw/workspace-trading/runtime/strategy_report.json"
  lookback_events: 200
  lookback_days: 30
  min_executed_trades: 3
  min_pnl_samples: 3
  low_win_rate: 0.4
  high_win_rate: 0.6
  negative_avg_pnl_ratio: -0.002
  positive_avg_pnl_ratio: 0.003
  reduce_order_size_factor: 0.9
  increase_order_size_factor: 1.05
  min_order_size_floor:
    crypto: 0.001
    cn_equity: 100
  max_order_size_cap:
    crypto: 0.05
    cn_equity: 5000

logging:
  decision_log: "C:/Users/Roy/.openclaw/workspace-trading/logs/trading_decisions.jsonl"
  state_file: "C:/Users/Roy/.openclaw/workspace-trading/runtime/trading_state.json"
