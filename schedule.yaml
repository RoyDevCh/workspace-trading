enabled: true
cron: "*/5 * * * *"
agent_id: "trading"
message: "Run one trading review using SOUL.md. Start with get_trading_state. If macro_state.stale=true, refresh it once with update_macro_state. Then call get_review_universe and process every returned symbol exactly once. For each symbol, call get_market_data with compact=true to confirm source and freshness, then call calculate_indicator using symbol/market/interval/lookback so the tool fetches full data internally instead of copying long candle arrays through the chat context. Validate the final signal with generate_signal, and write one decision log entry per symbol. Respect the per-symbol strategy from trading_rules.yaml, including the combined strategy for BTC/USDT and ETH/USDT. If a symbol has execution_allowed=false, you may analyze it but must not place a real order. If the final signal is HOLD, record HOLD and do not call check_risk. If the final signal is BUY or SELL and execution_allowed=true, call check_risk and only call place_order when allowed=true. With the current Discord-only runtime, place_order executes directly after risk passes because manual approval recovery is disabled."
